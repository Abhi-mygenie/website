# Nginx 301 redirect rules for the MyGenie V2.4 migration.
# Add inside the production `server { ... }` block (before the SPA location).
# These are TRUE server-side 301s — the gold standard for preserving SEO equity.

location = /fine-dining                 { return 301 /solutions/restaurants; }
location = /quick-service               { return 301 /solutions/qsr; }
location = /Cafe-and-coffee-shop        { return 301 /solutions/cafes; }
location = /cloud-kithen                { return 301 /solutions/cloud-kitchens; }
location = /bar-and-pubs                { return 301 /solutions/bars-pubs; }
location = /bakeries                    { return 301 /solutions/bakeries; }
location = /buffet-stations-restaurant  { return 301 /solutions/food-courts; }
location = /ice-green-and-dessert       { return 301 /solutions/ice-cream-desserts; }
location = /pizzerias                   { return 301 /solutions/restaurants; }
location = /smart-billing               { return 301 /product/sell-serve; }
location = /inventory-management        { return 301 /product/protect-profit; }
location = /reports_and-analytics       { return 301 /product/see-everything; }
location = /menu-management             { return 301 /product/sell-serve; }
location = /about-us                    { return 301 /about; }
location = /contact-us                  { return 301 /contact; }
location = /terms-and-conditions        { return 301 /terms; }
location = /privacy-policy              { return 301 /privacy; }
location = /refund-policy               { return 301 /refund; }
location = /blogs                       { return 301 /blog; }

# Canonical host: force www (matches current canonical). Adjust if non-www is chosen.
